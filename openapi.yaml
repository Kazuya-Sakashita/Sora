openapi: "3.1.0"

info:
  title: Sora API
  version: "0.2.0"
  description: |
    ペットメモリーケアアプリ Sora のREST API定義。
    認証は Supabase Auth（JWT Bearer トークン）で行う。

servers:
  - url: /api
    description: Next.js Route Handlers

security:
  - bearerAuth: []

tags:
  - name: auth
    description: 認証
  - name: pets
    description: ペットプロフィール
  - name: members
    description: 家族共有（ペット共同オーナー）
  - name: memories
    description: 思い出記録
  - name: feelings
    description: 気持ち記録
  - name: schedules
    description: 予定管理
  - name: billing
    description: 課金・プラン管理（Stripe）
  - name: sharing
    description: 思い出シェア・OGP
  - name: push
    description: Web Push 通知
  - name: report
    description: 年次メモリーレポート

# -----------------------------------------------
# パス定義
# -----------------------------------------------
paths:

  # === ペット ===

  /pets:
    get:
      tags: [pets]
      summary: アクセス可能なペット一覧を取得する（所有 + 共有）
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pet"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [pets]
      summary: ペットを登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /pets/{petId}:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [pets]
      summary: ペットを取得する
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [pets]
      summary: ペットを更新する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [pets]
      summary: ペットを削除する
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # === 思い出 ===

  /pets/{petId}/memories:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [memories]
      summary: 思い出一覧を取得する（新しい順）
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/MemoryCategory"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [memories]
      summary: 思い出を記録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "201":
          description: 記録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pets/{petId}/memories/{memoryId}:
    parameters:
      - $ref: "#/components/parameters/petId"
      - $ref: "#/components/parameters/memoryId"
    delete:
      tags: [memories]
      summary: 思い出を削除する
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /pets/{petId}/daily-question:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [ai]
      summary: 今日のAI問いかけを取得する（同日はキャッシュを返す）
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [question, generatedAt]
                properties:
                  question:
                    type: string
                    description: AI生成の問いかけ文（1文）
                  generatedAt:
                    type: string
                    format: date
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /pets/{petId}/memories/{memoryId}/reaction:
    parameters:
      - $ref: "#/components/parameters/petId"
      - $ref: "#/components/parameters/memoryId"
    post:
      tags: [memories, ai]
      summary: 記録に対するAIリアクションを生成する
      responses:
        "200":
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required: [reaction]
                properties:
                  reaction:
                    type: string
                    description: AIが生成した2〜3文の日本語リアクション
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pets/{petId}/chat:
    parameters:
      - $ref: "#/components/parameters/petId"
    post:
      tags: [chat, ai]
      summary: ロスケアモード専用AIチャット（Claude API）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  maxItems: 20
                  description: 会話履歴（最大10往復=20件）
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                        maxLength: 2000
      responses:
        "200":
          description: AI返答
          content:
            application/json:
              schema:
                type: object
                required: [reply]
                properties:
                  reply:
                    type: string
                    description: AIが生成した2〜4文の日本語返答
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # === 月次AIメモリーレター ===

  /pets/{petId}/letters:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [letters, ai]
      summary: 月次AIメモリーレター一覧取得（Sora+）
      responses:
        "200":
          description: レター一覧
          content:
            application/json:
              schema:
                type: object
                required: [letters]
                properties:
                  letters:
                    type: array
                    items:
                      type: object
                      required: [id, year, month, generatedAt]
                      properties:
                        id:
                          type: string
                        year:
                          type: integer
                        month:
                          type: integer
                        generatedAt:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /pets/{petId}/letters/{year}/{month}:
    parameters:
      - $ref: "#/components/parameters/petId"
      - name: year
        in: path
        required: true
        schema:
          type: integer
      - name: month
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 12
    get:
      tags: [letters, ai]
      summary: 特定月のAIメモリーレター取得（Sora+）
      responses:
        "200":
          description: レター本文
          content:
            application/json:
              schema:
                type: object
                required: [letter]
                properties:
                  letter:
                    type: object
                    required: [id, year, month, content, generatedAt]
                    properties:
                      id:
                        type: string
                      year:
                        type: integer
                      month:
                        type: integer
                      content:
                        type: string
                      generatedAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # === 気持ち記録 ===

  /pets/{petId}/feelings:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [feelings]
      summary: 気持ち記録一覧を取得する
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Feeling"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [feelings]
      summary: 気持ちを記録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeelingInput"
      responses:
        "201":
          description: 記録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feeling"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # === 予定 ===

  /pets/{petId}/schedules:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [schedules]
      summary: 予定一覧を取得する（日付昇順）
      parameters:
        - name: from
          in: query
          description: 開始日（ISO 8601）
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: 終了日（ISO 8601）
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Schedule"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [schedules]
      summary: 予定を追加する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pets/{petId}/schedules/{scheduleId}:
    parameters:
      - $ref: "#/components/parameters/petId"
      - $ref: "#/components/parameters/scheduleId"
    delete:
      tags: [schedules]
      summary: 予定を削除する
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # === 家族共有 ===

  /pets/{petId}/invite:
    parameters:
      - $ref: "#/components/parameters/petId"
    post:
      tags: [members]
      summary: 招待リンクを生成する（OWNER のみ）
      responses:
        "200":
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required: [url, expiresAt]
                properties:
                  url:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /pets/{petId}/members:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [members]
      summary: メンバー一覧を取得する（OWNER のみ）
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PetMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /pets/{petId}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/petId"
      - $ref: "#/components/parameters/memberId"
    delete:
      tags: [members]
      summary: メンバーを除外する（OWNER のみ）
      responses:
        "204":
          description: 除外成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /invite/accept:
    post:
      tags: [members]
      summary: 招待を受け入れてメンバーとして参加する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  format: uuid
      responses:
        "201":
          description: 参加成功
          content:
            application/json:
              schema:
                type: object
                required: [petId]
                properties:
                  petId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: 招待リンクの有効期限切れ
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  # === フォトブック ===

  /pets/{petId}/photobook:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [report]
      summary: 月次フォトブックを PDF で取得する（Sora+ のみ）
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: PDF 生成成功
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  # === 年次メモリーレポート ===

  /pets/{petId}/report:
    parameters:
      - $ref: "#/components/parameters/petId"
    get:
      tags: [report]
      summary: 年次メモリーレポートを PDF で取得する（Sora+ のみ）
      parameters:
        - name: year
          in: query
          description: 対象年（省略時は前年）
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
      responses:
        "200":
          description: PDF 生成成功
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  # === 課金・プラン管理 ===

  /billing/plan:
    get:
      tags: [billing]
      summary: 現在のプランを取得する
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [plan]
                properties:
                  plan:
                    $ref: "#/components/schemas/BillingPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/checkout:
    post:
      tags: [billing]
      summary: Stripe Checkout セッションを作成する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interval]
              properties:
                interval:
                  $ref: "#/components/schemas/CheckoutInterval"
      responses:
        "200":
          description: セッション作成成功
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/portal:
    post:
      tags: [billing]
      summary: Stripe Customer Portal セッションを作成する
      responses:
        "200":
          description: セッション作成成功
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/webhook:
    post:
      tags: [billing]
      summary: Stripe Webhook イベントを受信する（Stripe からのみ呼ばれる）
      security: []
      responses:
        "200":
          description: 受信成功
        "400":
          $ref: "#/components/responses/BadRequest"

  # === 思い出シェア・OGP ===

  /share/{memoryId}:
    parameters:
      - name: memoryId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [sharing]
      summary: 公開思い出データを取得する（認証不要）
      security: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareMemory"
        "404":
          $ref: "#/components/responses/NotFound"

  /og:
    get:
      tags: [sharing]
      summary: OGP / マイルストーン記念カード画像を生成する（認証不要）
      security: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [memory, milestone]
            default: memory
        - name: title
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: petName
          in: query
          schema:
            type: string
        - name: photoUrl
          in: query
          schema:
            type: string
            format: uri
        - name: label
          in: query
          description: "milestone タイプ時の記念日ラベル（例: 100日目）"
          schema:
            type: string
        - name: emoji
          in: query
          description: "milestone タイプ時の絵文字"
          schema:
            type: string
      responses:
        "200":
          description: 画像生成成功
          content:
            image/png:
              schema:
                type: string
                format: binary

  # === Web Push 通知 ===

  /push/subscribe:
    post:
      tags: [push]
      summary: Push 購読情報を登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, p256dh, auth]
              properties:
                endpoint:
                  type: string
                  format: uri
                p256dh:
                  type: string
                auth:
                  type: string
      responses:
        "201":
          description: 登録成功
        "401":
          $ref: "#/components/responses/Unauthorized"

  /push/send:
    post:
      tags: [push]
      summary: デイリーリマインダー Push を送信する（Cron のみ）
      security: []
      responses:
        "200":
          description: 送信成功

  /push/annual:
    post:
      tags: [push]
      summary: 年次レポート完成 Push を送信する（Cron のみ）
      security: []
      responses:
        "200":
          description: 送信成功

# -----------------------------------------------
# スキーマ・共通定義
# -----------------------------------------------
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth が発行する JWT トークン

  parameters:
    petId:
      name: petId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    memoryId:
      name: memoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    scheduleId:
      name: scheduleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    memberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    # --- ペット ---
    Species:
      type: string
      enum: [dog, cat, rabbit, bird, other]

    Gender:
      type: string
      enum: [male, female, unknown]

    PetStatus:
      type: string
      enum: [alive, rainbow_bridge]

    PetRole:
      type: string
      enum: [owner, member]
      description: owner = ペット登録者, member = 招待で参加した家族

    Pet:
      type: object
      required: [id, name, status, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        nickname:
          type: string
          maxLength: 50
        species:
          $ref: "#/components/schemas/Species"
        breed:
          type: string
          maxLength: 100
        birthDate:
          type: string
          format: date
        broughtAt:
          type: string
          format: date
          description: ペットを迎えた日
        gender:
          $ref: "#/components/schemas/Gender"
        photoUrl:
          type: string
          format: uri
        personality:
          type: string
          maxLength: 500
        favorites:
          type: string
          maxLength: 500
        status:
