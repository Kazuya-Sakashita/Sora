<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunrise" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD4A8"/>
      <stop offset="50%" stop-color="#F5A07A"/>
      <stop offset="100%" stop-color="#E87560"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5EE"/>
      <stop offset="100%" stop-color="#FDF0F8"/>
    </linearGradient>
  </defs>

  <!-- 背景: 朝焼けグラデーション -->
  <rect width="180" height="180" rx="40" fill="url(#sunrise)"/>

  <!-- 内側の柔らかい光 -->
  <ellipse cx="75" cy="60" rx="50" ry="40" fill="white" opacity="0.15"/>

  <!-- ハート形 -->
  <path
    d="M90 128
       C 56 110, 30 90, 30 64
       C 30 44, 48 32, 66 38
       C 76 41, 85 48, 90 57
       C 95 48, 104 41, 114 38
       C 132 32, 150 44, 150 64
       C 150 90, 124 110, 90 128 Z"
    fill="white"
    opacity="0.92"
  />
</svg>
