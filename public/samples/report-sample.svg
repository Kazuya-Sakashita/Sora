<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D3561"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EEE4"/>
      <stop offset="100%" style="stop-color:#EDD9B5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="480" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="540" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="150" cy="150" r="1" fill="white" opacity="0.3"/>
  <!-- Title area -->
  <text x="300" y="180" font-family="Georgia, serif" font-size="14" fill="#EDD9B5" text-anchor="middle" opacity="0.8" letter-spacing="4">ANNUAL MEMORY REPORT</text>
  <text x="300" y="240" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">2025</text>
  <text x="300" y="280" font-family="sans-serif" font-size="18" fill="#EDD9B5" text-anchor="middle">モモ との1年間</text>
  <!-- Divider -->
  <line x1="200" y1="310" x2="400" y2="310" stroke="#EDD9B5" stroke-width="0.5" opacity="0.5"/>
  <!-- Stats cards -->
  <rect x="60" y="340" width="140" height="100" rx="12" fill="url(#card)" opacity="0.15"/>
  <text x="130" y="385" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">142</text>
  <text x="130" y="410" font-family="sans-serif" font-size="11" fill="#EDD9B5" text-anchor="middle">思い出</text>
  <rect x="230" y="340" width="140" height="100" rx="12" fill="url(#card)" opacity="0.15"/>
  <text x="300" y="385" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">89</text>
  <text x="300" y="410" font-family="sans-serif" font-size="11" fill="#EDD9B5" text-anchor="middle">枚の写真</text>
  <rect x="400" y="340" width="140" height="100" rx="12" fill="url(#card)" opacity="0.15"/>
  <text x="470" y="385" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">52</text>
  <text x="470" y="410" font-family="sans-serif" font-size="11" fill="#EDD9B5" text-anchor="middle">連続記録日</text>
  <!-- Mood chart -->
  <rect x="60" y="470" width="480" height="160" rx="12" fill="white" opacity="0.07"/>
  <text x="100" y="505" font-family="sans-serif" font-size="12" fill="#EDD9B5">気持ちの記録</text>
  <rect x="80" y="520" width="60" height="80" rx="4" fill="#F9A825" opacity="0.7"/>
  <text x="110" y="618" font-family="sans-serif" font-size="10" fill="#EDD9B5" text-anchor="middle">うれしい</text>
  <rect x="160" y="540" width="60" height="60" rx="4" fill="#4FC3F7" opacity="0.7"/>
  <text x="190" y="618" font-family="sans-serif" font-size="10" fill="#EDD9B5" text-anchor="middle">穏やか</text>
  <rect x="240" y="550" width="60" height="50" rx="4" fill="#81C784" opacity="0.7"/>
  <text x="270" y="618" font-family="sans-serif" font-size="10" fill="#EDD9B5" text-anchor="middle">たのしい</text>
  <rect x="320" y="565" width="60" height="35" rx="4" fill="#FF8A65" opacity="0.7"/>
  <text x="350" y="618" font-family="sans-serif" font-size="10" fill="#EDD9B5" text-anchor="middle">心配</text>
  <rect x="400" y="555" width="60" height="45" rx="4" fill="#CE93D8" opacity="0.7"/>
  <text x="430" y="618" font-family="sans-serif" font-size="10" fill="#EDD9B5" text-anchor="middle">愛おしい</text>
  <!-- Cover photo placeholder -->
  <rect x="160" y="660" width="280" height="100" rx="8" fill="white" opacity="0.08"/>
  <text x="300" y="718" font-family="sans-serif" font-size="32" text-anchor="middle">🐾</text>
  <!-- Footer -->
  <text x="300" y="780" font-family="sans-serif" font-size="11" fill="#EDD9B5" text-anchor="middle" opacity="0.5">Sora — ペットとの日々を残す</text>
</svg>
