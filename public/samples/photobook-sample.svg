<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EEE4"/>
      <stop offset="100%" style="stop-color:#EDD9B5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="600" height="120" fill="#E8D5B0" opacity="0.6"/>
  <text x="300" y="55" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#5C4A2A" text-anchor="middle">Sora Photo Book</text>
  <text x="300" y="85" font-family="Georgia, serif" font-size="16" fill="#8B6E3C" text-anchor="middle">2025年 4月</text>
  <text x="300" y="108" font-family="sans-serif" font-size="12" fill="#A0855A" text-anchor="middle">モモ との日々</text>
  <!-- Photo placeholders -->
  <rect x="40" y="140" width="240" height="200" rx="8" fill="#D4B896" opacity="0.5"/>
  <text x="160" y="248" font-family="sans-serif" font-size="40" text-anchor="middle">🐾</text>
  <rect x="320" y="140" width="240" height="200" rx="8" fill="#C9A87C" opacity="0.5"/>
  <text x="440" y="248" font-family="sans-serif" font-size="40" text-anchor="middle">📷</text>
  <rect x="40" y="360" width="520" height="180" rx="8" fill="#DCC9A8" opacity="0.4"/>
  <text x="300" y="458" font-family="sans-serif" font-size="40" text-anchor="middle">🌸</text>
  <!-- Caption area -->
  <rect x="40" y="560" width="520" height="60" rx="6" fill="#F0E4CE" opacity="0.8"/>
  <text x="300" y="594" font-family="sans-serif" font-size="13" fill="#7A5C35" text-anchor="middle">「今日も元気いっぱいのモモ」</text>
  <!-- Memory entries -->
  <rect x="40" y="640" width="520" height="2" fill="#D4B896" opacity="0.4"/>
  <text x="60" y="670" font-family="sans-serif" font-size="12" fill="#8B6E3C">📝  4月3日 — はじめての公園</text>
  <text x="60" y="695" font-family="sans-serif" font-size="12" fill="#8B6E3C">📝  4月12日 — トリミング後の晴れ姿</text>
  <text x="60" y="720" font-family="sans-serif" font-size="12" fill="#8B6E3C">📝  4月24日 — お誕生日ケーキ</text>
  <!-- Footer -->
  <text x="300" y="780" font-family="sans-serif" font-size="11" fill="#B08D60" text-anchor="middle" opacity="0.7">Sora — ペットとの日々を残す</text>
</svg>
